name: Deploy to AWS

on:
  push:
    branches:
      - main        # → deploys to prod
      - dev         # → deploys to dev
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

jobs:
  deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      # ── 1. Checkout code ───────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'                      # ← enables npm cache

      # ── 3. Cache node_modules ──────────────────────────────────
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # ── 4. Install dependencies (skipped if cache hit) ─────────
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install

      # ── 5. Configure AWS credentials ──────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 6. Determine stage from branch ────────────────────────
      - name: Set stage
        id: stage
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "stage=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stage=${{ github.event.inputs.stage }}" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
          fi

      # ── 7. Deploy via Serverless Framework ────────────────────
      - name: Deploy
        run: npx serverless deploy --stage ${{ steps.stage.outputs.stage }} --verbose

      # ── 8. Print the API URL ───────────────────────────────────
      - name: Print API endpoints
        run: npx serverless info --stage ${{ steps.stage.outputs.stage }}
